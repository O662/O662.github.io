<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writings Viewer</title>
    <link rel="stylesheet" href="stylesWritingsViewer.css">
</head>
<body>
    <header class="viewer-header">
        <div>
            <h1 id="viewer-title">Writings Viewer</h1>
            <p class="viewer-subtitle">Adjust fonts, size, and colors for comfortable reading.</p>
        </div>
        <div class="viewer-actions">
            <button class="viewer-toggle" type="button" id="viewer-toggle">Reader Settings</button>
            <a class="viewer-back" href="pPortfolio.html#writings">Back to Writings</a>
        </div>
    </header>

    <section class="viewer-controls is-hidden" aria-label="Reader controls" id="viewer-controls">
        <label>
            Font
            <select id="font-family">
                <option value="Georgia, serif">Georgia</option>
                <option value="'Merriweather', serif">Merriweather</option>
                <option value="'Playfair Display', serif">Playfair Display</option>
                <option value="'Times New Roman', serif">Times New Roman</option>
                <option value="'Fira Sans', sans-serif">Fira Sans</option>
                <option value="'Roboto', sans-serif">Roboto</option>
                <option value="Arial, sans-serif">Arial</option>
                <option value="'Courier New', monospace">Courier New</option>
                <option value="'Source Code Pro', monospace">Source Code Pro</option>
            </select>
        </label>
        <label>
            Size
            <input id="font-size" type="range" min="14" max="24" value="18">
        </label>
        <label>
            Line height
            <input id="line-height" type="range" min="1.3" max="2.0" step="0.05" value="1.6">
        </label>
        <label>
            Background
            <input id="bg-color" type="color" value="#f6f2ea">
        </label>
        <label>
            Text
            <input id="text-color" type="color" value="#1d1d1d">
        </label>
    </section>

    <main class="viewer-content">
        <div id="viewer-status" class="viewer-status">Loading document...</div>
        <iframe id="viewer-frame" title="Writing document"></iframe>
    </main>

    <script>
        (function () {
            const frame = document.getElementById("viewer-frame");
            const status = document.getElementById("viewer-status");
            const titleEl = document.getElementById("viewer-title");

            const fontFamily = document.getElementById("font-family");
            const fontSize = document.getElementById("font-size");
            const lineHeight = document.getElementById("line-height");
            const bgColor = document.getElementById("bg-color");
            const textColor = document.getElementById("text-color");
            const controls = document.getElementById("viewer-controls");
            const toggle = document.getElementById("viewer-toggle");

            const params = new URLSearchParams(window.location.search);
            const doc = params.get("doc");

            function titleFromFilename(path) {
                const base = (path || "").split("/").pop() || "";
                const noExt = base.replace(/\.[^.]+$/, "");
                return noExt
                    .replace(/[_-]+/g, " ")
                    .replace(/\s+/g, " ")
                    .trim()
                    .replace(/\b\w/g, (match) => match.toUpperCase()) || "Writings Viewer";
            }

            function injectBase(html, baseHref) {
                if (/<head[\s>]/i.test(html)) {
                    return html.replace(/<head[^>]*>/i, (match) => `${match}\n<base href=\"${baseHref}\">`);
                }
                return `<!DOCTYPE html><html><head><base href=\"${baseHref}\"></head><body>${html}</body></html>`;
            }

            function stripInlineStyles(doc) {
                const elements = doc.querySelectorAll("[style]");
                elements.forEach((el) => {
                    el.removeAttribute("style");
                });
            }

            function stripWordStyleBlocks(doc) {
                const styleTags = doc.querySelectorAll("style");
                styleTags.forEach((styleTag) => {
                    if (styleTag.id === "reader-style") {
                        return;
                    }
                    styleTag.remove();
                });
            }

            function unwrapFontTags(doc) {
                const fontTags = doc.querySelectorAll("font");
                fontTags.forEach((fontTag) => {
                    const span = doc.createElement("span");
                    while (fontTag.firstChild) {
                        span.appendChild(fontTag.firstChild);
                    }
                    fontTag.replaceWith(span);
                });
            }

            function ensureFontStylesheet(doc) {
                if (!doc.head || doc.getElementById("reader-fonts")) {
                    return;
                }
                const link = doc.createElement("link");
                link.id = "reader-fonts";
                link.rel = "stylesheet";
                link.href = "https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;600&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;700&family=Roboto:wght@400;700&family=Source+Code+Pro:wght@400;600&display=swap";
                doc.head.appendChild(link);
            }

            function normalizeDocument(doc) {
                const root = doc.documentElement;
                if (root && root.getAttribute("data-reader-normalized") === "true") {
                    return;
                }
                stripWordStyleBlocks(doc);
                stripInlineStyles(doc);
                unwrapFontTags(doc);
                if (root) {
                    root.setAttribute("data-reader-normalized", "true");
                }
            }

            function applyReaderStyles() {
                if (!frame.contentDocument) {
                    return;
                }
                const doc = frame.contentDocument;
                const root = doc.documentElement;
                const body = doc.body || doc.documentElement;
                let styleTag = doc.getElementById("reader-style");
                if (!styleTag) {
                    styleTag = doc.createElement("style");
                    styleTag.id = "reader-style";
                    doc.head.appendChild(styleTag);
                }

                styleTag.textContent = `
                    html, body {
                        background: ${bgColor.value};
                        color: ${textColor.value};
                        font-family: ${fontFamily.value};
                        font-size: ${fontSize.value}px;
                        line-height: ${lineHeight.value};
                        margin: 0;
                        padding: 24px;
                    }
                    *, *::before, *::after {
                        font-family: ${fontFamily.value} !important;
                        font-size: ${fontSize.value}px !important;
                        line-height: ${lineHeight.value} !important;
                        color: ${textColor.value} !important;
                        background-color: transparent !important;
                    }
                    img, video, iframe {
                        max-width: 100%;
                        height: auto;
                    }
                `;

                ensureFontStylesheet(doc);
                normalizeDocument(doc);

                if (root) {
                    root.style.setProperty("font-family", fontFamily.value, "important");
                    root.style.setProperty("font-size", `${fontSize.value}px`, "important");
                    root.style.setProperty("line-height", `${lineHeight.value}`, "important");
                    root.style.setProperty("color", textColor.value, "important");
                    root.style.setProperty("background-color", bgColor.value, "important");
                }
                if (body) {
                    body.style.setProperty("font-family", fontFamily.value, "important");
                    body.style.setProperty("font-size", `${fontSize.value}px`, "important");
                    body.style.setProperty("line-height", `${lineHeight.value}`, "important");
                    body.style.setProperty("color", textColor.value, "important");
                    body.style.setProperty("background-color", bgColor.value, "important");
                }

            }

            function detectCharset(buffer) {
                const header = new TextDecoder("iso-8859-1").decode(buffer.slice(0, 2048));
                const match = header.match(/charset\s*=\s*([\w-]+)/i);
                return match ? match[1].toLowerCase() : "utf-8";
            }

            function countReplacementChars(text) {
                let count = 0;
                for (let i = 0; i < text.length; i += 1) {
                    if (text[i] === "\ufffd") {
                        count += 1;
                    }
                }
                return count;
            }

            function decodeWithBestCharset(buffer, declaredCharset) {
                const candidates = [];
                const declared = declaredCharset || "utf-8";
                const primary = declared === "utf-8" ? ["utf-8"] : [declared, "utf-8", "windows-1252"];
                primary.forEach((name) => {
                    try {
                        const text = new TextDecoder(name).decode(buffer);
                        candidates.push({ name, text, replacements: countReplacementChars(text) });
                    } catch (error) {
                        // Ignore unsupported decoders.
                    }
                });
                if (candidates.length === 0) {
                    return new TextDecoder("utf-8").decode(buffer);
                }
                candidates.sort((a, b) => a.replacements - b.replacements);
                return candidates[0].text;
            }

            function normalizeMojibake(text) {
                return text
                    .replace(/ï¿½/g, "—")
                    .replace(/â€”/g, "—")
                    .replace(/â€“/g, "–")
                    .replace(/â€œ/g, "“")
                    .replace(/â€�/g, "”")
                    .replace(/â€˜/g, "‘")
                    .replace(/â€™/g, "’");
            }

            function loadDocument() {
                if (!doc) {
                    status.textContent = "No document specified.";
                    return;
                }

                titleEl.textContent = titleFromFilename(doc);

                fetch(doc, { cache: "no-store" })
                    .then((response) => response.arrayBuffer())
                    .then((buffer) => {
                        const charset = detectCharset(buffer);
                        const html = normalizeMojibake(decodeWithBestCharset(buffer, charset));
                        const docUrl = new URL(doc, window.location.href);
                        const baseHref = docUrl.href.substring(0, docUrl.href.lastIndexOf("/") + 1);
                        const sanitized = injectBase(html, baseHref);
                        frame.srcdoc = sanitized;
                        status.textContent = "";
                    })
                    .catch(() => {
                        status.textContent = "Unable to load the document.";
                    });
            }

            frame.addEventListener("load", applyReaderStyles);
            [fontFamily, fontSize, lineHeight, bgColor, textColor].forEach((control) => {
                control.addEventListener("input", applyReaderStyles);
                control.addEventListener("change", applyReaderStyles);
            });

            if (toggle && controls) {
                toggle.addEventListener("click", () => {
                    controls.classList.toggle("is-hidden");
                });
            }

            loadDocument();
        })();
    </script>
</body>
</html>
