<script>
    document.addEventListener('DOMContentLoaded', function () {
        const hamburger = document.getElementById('hamburger-menu');
        const menu = document.getElementById('nav-menu');

        if (hamburger && menu) {
            // ── Hamburger toggle ──────────────────────────────────
            hamburger.addEventListener('click', function () {
                hamburger.classList.toggle('open');
                menu.classList.toggle('open');
            });

            // ── Mobile: click-to-expand dropdowns ─────────────────
            menu.querySelectorAll('.dropdown').forEach(function (dropdown) {
                const btn = dropdown.querySelector('.dropbtn');
                if (btn) {
                    btn.addEventListener('click', function (e) {
                        if (window.innerWidth <= 768) {
                            e.preventDefault();
                            dropdown.classList.toggle('mobile-open');
                        }
                    });
                }
            });

            // ── Desktop: hover with delay so the gap between the
            //    floating pill and the fixed dropdown doesn't close it ──
            menu.querySelectorAll('.dropdown').forEach(function (dropdown) {
                let hideTimer;

                function showDropdown() {
                    clearTimeout(hideTimer);
                    dropdown.classList.add('active');
                }

                function scheduleHide() {
                    clearTimeout(hideTimer);
                    hideTimer = setTimeout(function () {
                        dropdown.classList.remove('active');
                    }, 180);
                }

                // Hovering the trigger button
                dropdown.addEventListener('mouseenter', function () {
                    if (window.innerWidth > 768) showDropdown();
                });
                dropdown.addEventListener('mouseleave', function () {
                    if (window.innerWidth > 768) scheduleHide();
                });

                // Hovering the dropdown panel itself keeps it open
                const content = dropdown.querySelector('.dropdown-content');
                if (content) {
                    content.addEventListener('mouseenter', function () {
                        if (window.innerWidth > 768) showDropdown();
                    });
                    content.addEventListener('mouseleave', function () {
                        if (window.innerWidth > 768) scheduleHide();
                    });
                }
            });
        }
    });
</script>
